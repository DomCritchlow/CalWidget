name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.0.1). Leave empty to use pbxproj value.'
        required: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            INPUT="${{ inputs.version }}"
            echo "version=${INPUT:-$(grep -m1 MARKETING_VERSION CalWidget.xcodeproj/project.pbxproj | awk -F' = ' '{gsub(/[ ;]/,"",$2); print $2}')}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarytool credentials (App Store Connect API key)
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          # Managed Apple IDs can't use app-specific passwords with notarytool,
          # so we authenticate with an App Store Connect API key instead.
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"
          xcrun notarytool store-credentials calwidget-notary \
            --key "$RUNNER_TEMP/asc_api_key.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID"

      - name: Set up Sparkle private key
        env:
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/sparkle.key"
          echo "SPARKLE_PRIVATE_KEY_FILE=$RUNNER_TEMP/sparkle.key" >> "$GITHUB_ENV"

      - name: Install Sparkle helper tools
        run: |
          SPARKLE_VERSION="2.6.4"
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p vendor/Sparkle
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C vendor/Sparkle

      - name: Build, sign, notarize, package
        run: scripts/release.sh "${{ steps.ver.outputs.version }}"

      - name: Upload DMG to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CalWidget-${{ steps.ver.outputs.version }}.dmg
          body_path: CHANGELOG.md
          draft: false

      - name: Commit updated appcast
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          if ! git diff --staged --quiet; then
            git commit -m "release: ${{ github.ref_name }} appcast"
            git push origin main
          fi
